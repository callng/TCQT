<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />
    <title>TCQT 设置</title>
    <script>
        (function () {
            try {
                if (typeof TCQT !== 'undefined' && TCQT.isDarkModeByHost && TCQT.isDarkModeByHost()) {
                    document.documentElement.classList.add('dark-mode');
                    document.querySelector('meta[name="theme-color"][media="(prefers-color-scheme: light)"]').setAttribute('content', '#111827');
                }
            } catch (e) {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.classList.add('dark-mode');
                }
            }
        })();
    </script>
    <style>
        html,
        body {
            overflow-anchor: none;
        }

        :root {
            --kbd: 0px;
            --md-sys-color-primary: #0a56d9;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #d3e3fd;
            --md-sys-color-on-primary-container: #041e49;

            --md-sys-color-background: #f8f9fa;
            --md-sys-color-on-background: #1f1f1f;
            --md-sys-color-surface: #ffffff;
            --md-sys-color-surface-variant: #e1e3e1;
            --md-sys-color-on-surface: #1f1f1f;
            --md-sys-color-on-surface-variant: #444746;
            --md-sys-color-outline: #747775;
            --md-sys-color-outline-variant: #c4c7c5;

            --md-sys-color-error: #ba1a1a;
            --md-sys-color-success: #146c2e;

            --md-sys-elevation-1: 0 1px 2px 0 rgba(0, 0, 0, 0.1), 0 1px 3px 1px rgba(0, 0, 0, 0.06);
            --md-sys-elevation-2: 0 1px 2px 0 rgba(0, 0, 0, 0.1), 0 2px 6px 2px rgba(0, 0, 0, 0.06);
            --md-sys-elevation-3: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 4px 8px 3px rgba(0, 0, 0, 0.06);

            --md-sys-shape-corner-medium: 12px;
            --md-sys-shape-corner-large: 16px;
            --md-sys-shape-corner-full: 9999px;

            --transition-standard: 200ms cubic-bezier(0.2, 0, 0, 1);
            --transition-emphasized: 300ms cubic-bezier(0.2, 0, 0, 1);
        }

        .dark-mode {
            --md-sys-color-primary: #a8c7fa;
            --md-sys-color-on-primary: #062e6f;
            --md-sys-color-primary-container: #0842a0;
            --md-sys-color-on-primary-container: #d3e3fd;

            --md-sys-color-background: #111114;
            --md-sys-color-on-background: #e2e2e2;
            --md-sys-color-surface: #1f1f22;
            --md-sys-color-surface-variant: #444746;
            --md-sys-color-on-surface: #e2e2e2;
            --md-sys-color-on-surface-variant: #c4c7c5;
            --md-sys-color-outline: #8e918f;
            --md-sys-color-outline-variant: #444746;

            --md-sys-color-error: #ffb4ab;
            --md-sys-color-success: #6dd58c;

            --md-sys-elevation-1: 0 1px 2px 0 rgba(0, 0, 0, 0.3), 0 1px 3px 1px rgba(0, 0, 0, 0.15);
            --md-sys-elevation-2: 0 1px 2px 0 rgba(0, 0, 0, 0.3), 0 2px 6px 2px rgba(0, 0, 0, 0.15);
            --md-sys-elevation-3: 0 1px 3px 0 rgba(0, 0, 0, 0.3), 0 4px 8px 3px rgba(0, 0, 0, 0.15);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            padding-bottom: calc(var(--kbd) + env(safe-area-inset-bottom, 0px));
            min-height: 100dvh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            overflow-x: hidden;
            line-height: 1.5;
            transition: background-color var(--transition-standard), color var(--transition-standard);
        }

        .icon {
            fill: currentColor;
            display: inline-block;
            vertical-align: -.125em;
            width: 1em;
            height: 1em;
            pointer-events: none;
        }

        .icon-sm {
            width: 14px;
            height: 14px;
            pointer-events: none;
        }

        .icon-md {
            width: 18px;
            height: 18px;
            pointer-events: none;
        }

        .empty-icon {
            width: 48px;
            height: 48px;
            opacity: 0.6;
            display: block;
            margin: 0 auto 16px;
            pointer-events: none;
        }

        .app-background {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            opacity: 0.4;
            background: radial-gradient(circle at 15% 10%, rgba(10, 86, 217, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 90%, rgba(20, 108, 46, 0.05) 0%, transparent 40%);
        }

        .dark-mode .app-background {
            opacity: 0.15;
            background: radial-gradient(circle at 15% 10%, rgba(168, 199, 250, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 90%, rgba(109, 213, 140, 0.1) 0%, transparent 40%);
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--md-sys-color-background);
            z-index: 9999;
            transition: opacity var(--transition-standard);
        }

        .md3-spinner {
            width: 48px;
            height: 48px;
            animation: rotate 2s linear infinite;
        }

        .md3-spinner circle {
            stroke: var(--md-sys-color-primary);
            stroke-dasharray: 1, 200;
            stroke-dashoffset: 0;
            animation: dash 1.5s ease-in-out infinite;
            stroke-linecap: round;
        }

        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes dash {
            0% {
                stroke-dasharray: 1, 200;
                stroke-dashoffset: 0;
            }

            50% {
                stroke-dasharray: 89, 200;
                stroke-dashoffset: -35px;
            }

            100% {
                stroke-dasharray: 89, 200;
                stroke-dashoffset: -124px;
            }
        }

        .app-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity var(--transition-emphasized), transform var(--transition-emphasized);
        }

        .app-container.ready {
            opacity: 1;
            transform: translateY(0);
        }

        .app-header {
            margin-bottom: 24px;
            text-align: center;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 12px;
            color: var(--md-sys-color-on-background);
            letter-spacing: -0.02em;
        }

        .version-badges {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: var(--md-sys-shape-corner-full);
            font-size: 0.8125rem;
            font-weight: 500;
        }

        .badge-host {
            background-color: var(--md-sys-color-surface-variant);
            color: var(--md-sys-color-on-surface-variant);
        }

        .badge-module {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
        }

        .badge.error {
            background-color: var(--md-sys-color-error);
            color: var(--md-sys-color-surface);
            opacity: 0.9;
        }

        .stats-card {
            display: flex;
            background: var(--md-sys-color-surface);
            border-radius: var(--md-sys-shape-corner-medium);
            padding: 12px 0;
            box-shadow: var(--md-sys-elevation-1);
            justify-content: space-evenly;
            align-items: center;
            border: 1px solid var(--md-sys-color-outline-variant);
        }

        .stat-item {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--md-sys-color-on-surface-variant);
            margin-top: 2px;
        }

        .text-success {
            color: var(--md-sys-color-success);
        }

        .text-muted {
            color: var(--md-sys-color-outline);
        }

        .stat-divider {
            width: 1px;
            height: 32px;
            background-color: var(--md-sys-color-surface-variant);
        }

        .sticky-nav-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 8px 0;
            background-color: var(--md-sys-color-background);
            margin: -8px 0 16px;
        }

        .tab-navigation-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            background: var(--md-sys-color-surface);
            padding: 6px;
            border-radius: var(--md-sys-shape-corner-full);
            box-shadow: var(--md-sys-elevation-1);
            border: 1px solid var(--md-sys-color-outline-variant);
        }

        .tab-navigation {
            flex: 1;
            display: flex;
            overflow-x: auto;
            gap: 4px;
            padding-right: 4px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            transition: opacity var(--transition-standard);
        }

        .tab-navigation::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            appearance: none;
            background: transparent;
            border: none;
            padding: 8px 16px;
            border-radius: var(--md-sys-shape-corner-full);
            color: var(--md-sys-color-on-surface-variant);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition-standard);
            flex-shrink: 0;
        }

        .tab-btn.active {
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
        }

        .icon-btn {
            appearance: none;
            background: transparent;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: var(--md-sys-color-on-surface-variant);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            flex-shrink: 0;
            transition: var(--transition-standard);
        }

        .icon-btn:active {
            background: var(--md-sys-color-surface-variant);
        }

        .search-bar-container {
            position: absolute;
            inset: 0;
            background: var(--md-sys-color-surface);
            border-radius: var(--md-sys-shape-corner-full);
            display: flex;
            align-items: center;
            padding: 0 6px;
            opacity: 0;
            pointer-events: none;
            transform: scaleX(0.95);
            transform-origin: right;
            transition: all 250ms cubic-bezier(0.2, 0, 0, 1);
        }

        .search-active .search-bar-container {
            opacity: 1;
            pointer-events: auto;
            transform: scaleX(1);
        }

        .search-active .tab-navigation,
        .search-active .search-trigger {
            opacity: 0;
            pointer-events: none;
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 0.9375rem;
            color: var(--md-sys-color-on-surface);
            padding: 0 8px;
            outline: none;
            width: 100%;
        }

        .search-input::placeholder {
            color: var(--md-sys-color-outline);
        }

        .search-clear {
            opacity: 0;
            pointer-events: none;
        }

        .search-clear.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .highlight {
            color: var(--md-sys-color-primary);
            font-weight: 700;
            background: var(--md-sys-color-primary-container);
            border-radius: 2px;
            padding: 0 2px;
        }

        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .feature-item {
            background: var(--md-sys-color-surface);
            border-radius: var(--md-sys-shape-corner-medium);
            border: 1px solid var(--md-sys-color-outline-variant);
            box-shadow: var(--md-sys-elevation-1);
            overflow: hidden;
            transition: box-shadow var(--transition-standard), transform var(--transition-standard);
            animation: slideUp 0.4s cubic-bezier(0.2, 0, 0, 1) backwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feature-header {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            gap: 12px;
            position: relative;
        }

        .feature-header:active {
            background-color: var(--md-sys-color-surface-variant);
        }

        .feature-title-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .feature-icon-toggle {
            color: var(--md-sys-color-outline);
            font-size: 1rem;
            transition: transform var(--transition-standard);
        }

        .expanded .feature-icon-toggle {
            transform: rotate(180deg);
            color: var(--md-sys-color-primary);
        }

        .feature-title {
            font-size: 1rem;
            font-weight: 500;
            color: var(--md-sys-color-on-surface);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .feature-content-wrapper {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows var(--transition-emphasized);
        }

        .expanded .feature-content-wrapper {
            grid-template-rows: 1fr;
        }

        .feature-content {
            overflow: hidden;
            padding: 0 16px;
            opacity: 0;
            transition: opacity 150ms ease;
        }

        .expanded .feature-content {
            opacity: 1;
            padding: 0 16px 16px;
            transition: opacity 300ms 100ms ease, padding var(--transition-emphasized);
        }

        .feature-desc {
            font-size: 0.875rem;
            color: var(--md-sys-color-on-surface-variant);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .switch-wrapper {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
            flex-shrink: 0;
        }

        .switch-wrapper input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .switch-track {
            position: absolute;
            inset: 0;
            background-color: var(--md-sys-color-surface-variant);
            border-radius: 999px;
            transition: var(--transition-standard);
            border: 2px solid var(--md-sys-color-outline);
            box-sizing: border-box;
        }

        .switch-track::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background-color: var(--md-sys-color-outline);
            border-radius: 50%;
            transition: transform var(--transition-standard), background-color var(--transition-standard), width var(--transition-standard);
        }

        .switch-wrapper input:checked+.switch-track {
            background-color: var(--md-sys-color-primary);
            border-color: var(--md-sys-color-primary);
        }

        .switch-wrapper input:checked+.switch-track::after {
            transform: translateX(22px);
            background-color: var(--md-sys-color-on-primary);
            width: 18px;
        }

        .switch-wrapper input:active+.switch-track::after {
            width: 24px;
        }

        .switch-wrapper input:checked:active+.switch-track::after {
            transform: translateX(16px);
        }

        .switch-wrapper input:disabled+.switch-track {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: var(--md-sys-color-background);
            border-radius: var(--md-sys-shape-corner-medium);
            cursor: pointer;
            transition: background var(--transition-standard);
            border: 1px solid transparent;
        }

        .option-label:active {
            background: var(--md-sys-color-surface-variant);
        }

        .option-label:has(input:checked) {
            background: var(--md-sys-color-primary-container);
            border-color: var(--md-sys-color-primary-container);
        }

        .option-label input {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: var(--md-sys-color-primary);
        }

        .option-text {
            font-size: 0.9375rem;
            color: var(--md-sys-color-on-surface);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        .custom-textarea {
            width: 100%;
            font-family: inherit;
            font-size: 0.9375rem;
            padding: 12px;
            border-radius: var(--md-sys-shape-corner-medium);
            border: 1px solid var(--md-sys-color-outline);
            background: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            resize: vertical;
            min-height: 100px;
            transition: border-color var(--transition-standard), box-shadow var(--transition-standard);
            outline: none;
        }

        .custom-textarea:focus {
            border-color: var(--md-sys-color-primary);
            box-shadow: 0 0 0 1px var(--md-sys-color-primary) inset;
        }

        .empty-state {
            text-align: center;
            padding: 48px 16px;
            color: var(--md-sys-color-outline);
        }

        .empty-state p {
            font-size: 1.125rem;
            font-weight: 500;
            margin: 0 0 8px;
            color: var(--md-sys-color-on-surface);
        }

        .empty-subtitle {
            font-size: 0.875rem;
        }

        .app-footer {
            margin-top: 32px;
            text-align: center;
            padding-bottom: 80px;
        }

        .footer-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            color: var(--md-sys-color-on-surface-variant);
            text-decoration: none;
            border-radius: var(--md-sys-shape-corner-medium);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .footer-btn:active {
            background: var(--md-sys-color-surface-variant);
        }

        .footer-copyright {
            font-size: 0.75rem;
            color: var(--md-sys-color-outline);
            margin-top: 16px;
        }

        .fab {
            position: fixed;
            right: 24px;
            bottom: calc(24px + var(--kbd));
            width: 64px;
            height: 64px;
            border-radius: var(--md-sys-shape-corner-large);
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border: none;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--md-sys-elevation-3);
            transition: all var(--transition-standard);
            z-index: 1000;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .fab:active:not(.disabled) {
            transform: translateY(2px);
            box-shadow: var(--md-sys-elevation-2);
        }

        .fab.disabled {
            background: var(--md-sys-color-surface-variant);
            color: var(--md-sys-color-outline);
            box-shadow: none;
            pointer-events: none;
        }

        .fab.pulse:not(.disabled) {
            animation: fabPulse 2s infinite;
        }

        @keyframes fabPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(10, 86, 217, 0.4);
            }

            70% {
                box-shadow: 0 0 0 12px rgba(10, 86, 217, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(10, 86, 217, 0);
            }
        }

        .dark-mode .fab.pulse:not(.disabled) {
            animation: fabPulseDark 2s infinite;
        }

        @keyframes fabPulseDark {
            0% {
                box-shadow: 0 0 0 0 rgba(168, 199, 250, 0.4);
            }

            70% {
                box-shadow: 0 0 0 12px rgba(168, 199, 250, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(168, 199, 250, 0);
            }
        }

        .toast-container {
            position: fixed;
            bottom: 100px;
            left: 0;
            right: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 9999;
        }

        .toast {
            background: var(--md-sys-color-on-surface);
            color: var(--md-sys-color-surface);
            padding: 12px 24px;
            border-radius: var(--md-sys-shape-corner-medium);
            box-shadow: var(--md-sys-elevation-2);
            font-size: 0.875rem;
            font-weight: 500;
            animation: toastIn 0.3s cubic-bezier(0.2, 0, 0, 1) forwards, toastOut 0.3s 2.7s ease-in forwards;
            max-width: 90vw;
            text-align: center;
            word-break: break-word;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.9);
            }
        }
    </style>
</head>

<body>
<div class="app-background"></div>

<div id="loading-overlay" class="loading-overlay">
    <div class="md3-spinner">
        <svg viewBox="25 25 50 50">
            <circle cx="50" cy="50" r="20" fill="none" stroke-width="4" stroke-miterlimit="10" />
        </svg>
    </div>
    <p>初始化中...</p>
</div>

<div id="app-container" class="app-container">
    <header class="app-header">
        <div>
            <h1 class="page-title">模块功能配置</h1>
            <div class="version-badges">
                <div class="badge badge-host" id="hostVersionBadge">
                    <svg class="icon icon-sm" viewBox="0 0 16 16">
                        <path

<script>
    'use strict';

    class TCQTService {
        constructor() {
            this._settingCache = new Map();
        }

        get isAvailable() {
            return typeof TCQT !== 'undefined';
        }

        getHostInfo() {
            if (!this.isAvailable) return null;
            try {
                return {
                    name: TCQT.getHostName() || 'QQ',
                    version: TCQT.getHostVersion() || '未知',
                    channel: TCQT.getHostChannel() || ''
                };
            } catch (e) {
                return null;
            }
        }

        getModuleInfo() {
            if (!this.isAvailable) return null;
            try {
                return {
                    name: TCQT.getModuleName() || 'TCQT',
                    version: TCQT.getModuleVersion() || '未知'
                };
            } catch (e) {
                return null;
            }
        }

        getFeaturesConfig() {
            if (!this.isAvailable) return [];
            try {
                const cfg = JSON.parse(TCQT.getFeaturesConfig());
                return Array.isArray(cfg) ? cfg : [];
            } catch (e) {
                return [];
            }
        }

        invalidateSetting(key) {
            if (typeof key === 'string' && key.length > 0) {
                this._settingCache.delete(key);
            }
        }

        invalidateAllSettings() {
            this._settingCache.clear();
        }

        getSetting(key) {
            if (!this.isAvailable) return { value: false };

            if (this._settingCache.has(key)) {
                return this._settingCache.get(key);
            }

            let result = { value: false };
            try {
                result = JSON.parse(TCQT.getSetting(key));
            } catch (e) {
                result = { value: false };
            }

            this._settingCache.set(key, result);
            return result;
        }

        getSettingValue(key, fallback = false) {
            const setting = this.getSetting(key);
            return setting && setting.value !== undefined ? setting.value : fallback;
        }

        setSettingCacheValue(key, value) {
            this._settingCache.set(key, { value });
        }

        saveBooleanSetting(key, value) {
            if (!this.isAvailable) return false;
            try {
                TCQT.saveValueB(key, value);
                this.setSettingCacheValue(key, value);
                return true;
            } catch (e) {
                this.invalidateSetting(key);
                return false;
            }
        }

        saveStringSetting(key, value) {
            if (!this.isAvailable) return false;
            try {
                TCQT.saveValueS(key, value);
                this.setSettingCacheValue(key, value);
                return true;
            } catch (e) {
                this.invalidateSetting(key);
                return false;
            }
        }

        saveIntSetting(key, value) {
            if (!this.isAvailable) return false;
            try {
                TCQT.saveValueI(key, value);
                this.setSettingCacheValue(key, value);
                return true;
            } catch (e) {
                this.invalidateSetting(key);
                return false;
            }
        }

        getEnabledActionCount() {
            return this.isAvailable ? TCQT.getEnabledActionCount() : 0;
        }

        getDisabledActionCount() {
            return this.isAvailable ? TCQT.getDisabledActionCount() : 0;
        }

        showToast(msg) {
            if (!this.isAvailable) return false;
            try {
                TCQT.toast(msg);
                return true;
            } catch (e) {
                return false;
            }
        }

        clearConfig() {
            if (!this.isAvailable) return false;
            try {
                TCQT.clear();
                this.invalidateAllSettings();
                return true;
            } catch (e) {
                return false;
            }
        }

        exitApp() {
            if (!this.isAvailable) return false;
            try {
                TCQT.exitApp();
                return true;
            } catch (e) {
                return false;
            }
        }

        openUrl(url, skip = false) {
            if (!this.isAvailable) return false;
            try {
                TCQT.openUrlInDefaultBrowser(url, skip);
                return true;
            } catch (e) {
                return false;
            }
        }
    }

    class AppState {
        constructor() {
            this.features = [];
            this.featuresByTab = new Map();
            this.isInjected = false;
            this.currentTab = '';
            this.tabs = [];
            this.isSearch = false;
            this.searchKey = '';
            this.pending = new Map();
        }

        setFeatures(list) {
            const sorted = (Array.isArray(list) ? list.slice() : [])
                .sort((a, b) => (a.uiOrder || 1000) - (b.uiOrder || 1000));

            this.features = sorted.map((f, index) => {
                const label = f.label || '';
                const desc = f.desc || '';
                const tab = f.uiTab || '基础';
                const labelLower = label.toLowerCase();
                const descLower = desc.toLowerCase();
                return Object.assign({}, f, {
                    _order: index,
                    _tab: tab,
                    _labelLower: labelLower,
                    _descLower: descLower,
                    _searchHaystack: `${labelLower} ${descLower}`.trim()
                });
            });

            const tabSet = new Set();
            const grouped = new Map();

            this.features.forEach(f => {
                tabSet.add(f._tab);
                if (!grouped.has(f._tab)) grouped.set(f._tab, []);
                grouped.get(f._tab).push(f);
            });

            this.featuresByTab = grouped;
            this.tabs = Array.from(tabSet).sort((a, b) => {
                if (a === '基础') return -1;
                if (b === '基础') return 1;
                if (a === '调试') return 1;
                if (b === '调试') return -1;
                if (a === '高级') return 1;
                if (b === '高级') return -1;
                return a.localeCompare(b, 'zh-CN');
            });

            if ((!this.currentTab || !grouped.has(this.currentTab)) && this.tabs.length) {
                this.currentTab = this.tabs[0];
            }
        }

        getVisibleFeatures() {
            if (this.isSearch && this.searchKey.trim()) {
                const k = this.searchKey.trim().toLowerCase();
                const matched = [];

                for (const f of this.features) {
                    let prio = 0;
                    if (f._labelLower === k || f._descLower === k) prio = 3;
                    else if (f._labelLower.indexOf(k) > -1) prio = 2;
                    else if (f._descLower.indexOf(k) > -1) prio = 1;

                    if (prio > 0) {
                        matched.push({ feature: f, prio });
                    }
                }

                matched.sort((a, b) => b.prio - a.prio || a.feature._order - b.feature._order);
                return matched.map(item => item.feature);
            }

            return this.featuresByTab.get(this.currentTab) || [];
        }

        savePending(key, type, value) {
            if (!this.pending.has(key)) this.pending.set(key, {});
            this.pending.get(key)[type] = value;
        }

        getPending(key, type) {
            return this.pending.has(key) && type in this.pending.get(key)
                ? this.pending.get(key)[type]
                : null;
        }

        clearPending() {
            this.pending.clear();
        }

        hasPending() {
            return this.pending.size > 0;
        }
    }

    class UIManager {
        constructor(app) {
            this.app = app;
            this.els = {
                loading: document.getElementById('loading-overlay'),
                container: document.getElementById('app-container'),
                list: document.getElementById('feature-list'),
                empty: document.getElementById('empty-state'),
                tabs: document.getElementById('tab-navigation'),
                toast: document.getElementById('toast-container'),
                btnSave: document.getElementById('btnSave'),
                searchInput: document.getElementById('search-input'),
                btnSearch: document.getElementById('btn-search'),
                searchBackBtn: document.getElementById('search-back-btn'),
                navWrapper: document.getElementById('tab-navigation-wrapper')
            };

            this._tabRenderSignature = '';
            this._tabCenterKey = '';
            this._featureNodeCache = new Map();
        }

        scrollTabToCenter(btn, behavior = 'auto') {
            if (!btn || !this.els.tabs) return;
            const tabsEl = this.els.tabs;
            const target = btn.offsetLeft - ((tabsEl.clientWidth - btn.clientWidth) / 2);
            const max = Math.max(0, tabsEl.scrollWidth - tabsEl.clientWidth);
            const left = Math.max(0, Math.min(target, max));
            tabsEl.scrollTo({ left, behavior });
        }

        renderTabs(tabs, activeTab) {
            const signature = `${tabs.join('\u0001')}__${activeTab}`;
            const needRebuild = this._tabRenderSignature !== signature;

            if (tabs.length <= 1) {
                this.els.tabs.style.display = 'none';
                this._tabRenderSignature = signature;
                return;
            }

            this.els.tabs.style.display = 'flex';

            if (needRebuild) {
                const frag = document.createDocumentFragment();

                tabs.forEach(t => {
                    const btn = document.createElement('button');
                    btn.className = `tab-btn ${t === activeTab ? 'active' : ''}`;
                    btn.textContent = t;
                    btn.dataset.tab = t;
                    frag.appendChild(btn);
                });

                this.els.tabs.innerHTML = '';
                this.els.tabs.appendChild(frag);
                this._tabRenderSignature = signature;
            } else {
                const btns = this.els.tabs.querySelectorAll('.tab-btn');
                btns.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.tab === activeTab);
                });
            }

            const centerKey = `${activeTab}__${tabs.length}`;
            if (this._tabCenterKey !== centerKey) {
                const activeBtn = this.els.tabs.querySelector('.tab-btn.active');
                this.scrollTabToCenter(activeBtn, 'auto');
                this._tabCenterKey = centerKey;
            }
        }

        createHighlighter(keyword) {
            const k = (keyword || '').trim();
            if (!k) return text => text || '';

            const escaped = k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escaped})`, 'gi');

            return text => {
                if (!text) return '';
                return text.replace(regex, '<span class="highlight">$1</span>');
            };
        }

        createFeatureNode(feature) {
            const item = document.createElement('div');
            item.className = 'feature-item';
            item.dataset.expandable = '0';
            item.dataset.manualExpanded = '0';

            const header = document.createElement('div');
            header.className = 'feature-header';

            const titleWrap = document.createElement('div');
            titleWrap.className = 'feature-title-wrap';

            const icon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            icon.setAttribute('class', 'icon icon-sm feature-icon-toggle');
            icon.setAttribute('viewBox', '0 0 16 16');
            icon.setAttribute('aria-hidden', 'true');

            const iconPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            iconPath.setAttribute('fill-rule', 'evenodd');
            iconPath.setAttribute('d', 'M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z');
            icon.appendChild(iconPath);

            const title = document.createElement('span');
            title.className = 'feature-title';

            titleWrap.appendChild(icon);
            titleWrap.appendChild(title);

            const switchWrap = document.createElement('label');
            switchWrap.className = 'switch-wrapper';

            const switchInput = document.createElement('input');
            switchInput.type = 'checkbox';
            switchInput.dataset.role = 'switch';
            switchInput.dataset.settingKey = feature.key;

            const switchTrack = document.createElement('span');
            switchTrack.className = 'switch-track';

            switchWrap.appendChild(switchInput);
            switchWrap.appendChild(switchTrack);

            header.appendChild(titleWrap);
            header.appendChild(switchWrap);
            item.appendChild(header);

            const contentWrap = document.createElement('div');
            contentWrap.className = 'feature-content-wrapper';

            const content = document.createElement('div');
            content.className = 'feature-content';

            let descEl = null;
            if (feature.desc) {
                descEl = document.createElement('div');
                descEl.className = 'feature-desc';
                content.appendChild(descEl);
            }

            let optionInputs = [];
            if (feature.options && feature.options.length) {
                const grp = document.createElement('div');
                grp.className = 'options-group';

                const optKey = feature.options[0].key;
                const isMulti = !!feature.options[0].isMulti;

                feature.options.forEach(opt => {
                    const lbl = document.createElement('label');
                    lbl.className = 'option-label';

                    const input = document.createElement('input');
                    input.type = isMulti ? 'checkbox' : 'radio';
                    input.name = `opt-${feature.key}`;
                    input.value = String(opt.value);
                    input.dataset.role = 'option';
                    input.dataset.settingKey = optKey;
                    input.dataset.optionValue = String(opt.value);
                    input.dataset.multi = isMulti ? '1' : '0';

                    const text = document.createElement('span');
                    text.className = 'option-text';
                    text.textContent = opt.label;

                    lbl.appendChild(input);
                    lbl.appendChild(text);
                    grp.appendChild(lbl);
                    optionInputs.push(input);
                });

                content.appendChild(grp);
            }

            const textareaRefs = [];
            if (feature.textareas && feature.textareas.length) {
                const grp = document.createElement('div');
                grp.className = 'input-group';

                feature.textareas.forEach(ta => {
                    const txt = document.createElement('textarea');
                    txt.className = 'custom-textarea';
                    txt.placeholder = ta.placeholder || '';
                    txt.dataset.role = 'textarea';
                    txt.dataset.settingKey = ta.key;
                    grp.appendChild(txt);

                    textareaRefs.push({
                        key: ta.key,
                        el: txt
                    });
                });

                content.appendChild(grp);
            }

            contentWrap.appendChild(content);
            item.appendChild(contentWrap);

            const refs = {
                item,
                header,
                title,
                icon,
                switchInput,
                descEl,
                optionInputs,
                textareaRefs,
                expandable: !!(feature.desc || (feature.options && feature.options.length) || (feature.textareas && feature.textareas.length))
            };

            item._refs = refs;
            this._featureNodeCache.set(feature.key, item);
            return item;
        }

        getFeatureNode(feature) {
            if (this._featureNodeCache.has(feature.key)) {
                return this._featureNodeCache.get(feature.key);
            }
            return this.createFeatureNode(feature);
        }

        updateFeatureNode(node, feature, context) {
            const refs = node._refs;
            const {
                highlight,
                normalizedKeyword,
                isInjected,
                getSettingValue,
                index
            } = context;

            node.style.animationDelay = `${index * 18}ms`;

            refs.title.innerHTML = highlight(feature.label || '');

            if (refs.descEl) {
                refs.descEl.innerHTML = highlight(feature.desc || '');
            }

            const expandable = refs.expandable;
            node.dataset.expandable = expandable ? '1' : '0';
            refs.icon.style.display = expandable ? '' : 'none';

            const switchPending = this.app.state.getPending(feature.key, 'enabled');
            const switchValue = switchPending !== null
                ? switchPending
                : !!getSettingValue(feature.key, false);

            refs.switchInput.checked = switchValue;
            refs.switchInput.disabled = !isInjected;

            if (feature.options && feature.options.length && refs.optionInputs.length) {
                const optKey = feature.options[0].key;
                const isMulti = !!feature.options[0].isMulti;
                const optPending = this.app.state.getPending(optKey, 'value');
                const rawBaseValue = getSettingValue(optKey, isMulti ? 0 : feature.options[0].value);
                const parsed = parseInt(rawBaseValue, 10);
                const baseValue = Number.isNaN(parsed)
                    ? (isMulti ? 0 : feature.options[0].value)
                    : parsed;
                const currentValue = optPending !== null ? optPending : baseValue;

                refs.optionInputs.forEach(input => {
                    const optValue = parseInt(input.dataset.optionValue, 10);
                    if (isMulti) {
                        input.checked = (currentValue & (1 << (optValue - 1))) !== 0;
                    } else {
                        input.checked = currentValue === optValue;
                    }
                    input.disabled = !isInjected;
                });
            }

            if (refs.textareaRefs.length) {
                refs.textareaRefs.forEach(ref => {
                    const pendingValue = this.app.state.getPending(ref.key, 'value');
                    const resolved = pendingValue !== null
                        ? pendingValue
                        : (getSettingValue(ref.key, '') || '');

                    if (document.activeElement !== ref.el && ref.el.value !== resolved) {
                        ref.el.value = resolved;
                    }
                    ref.el.disabled = !isInjected;
                });
            }

            if (normalizedKeyword && expandable) {
                node.classList.toggle('expanded', feature._searchHaystack.indexOf(normalizedKeyword) > -1);
            } else {
                node.classList.toggle('expanded', node.dataset.manualExpanded === '1');
            }
        }

        renderFeatures(features, keyword = '') {
            const highlight = this.createHighlighter(keyword);
            const normalizedKeyword = (keyword || '').trim().toLowerCase();
            const isInjected = this.app.state.isInjected;

            const settingSnapshot = new Map();
            const getSettingValue = (key, fallback) => {
                if (settingSnapshot.has(key)) {
                    return settingSnapshot.get(key);
                }
                const value = this.app.tcqt.getSettingValue(key, fallback);
                settingSnapshot.set(key, value);
                return value;
            };

            const desiredNodes = [];

            for (let i = 0; i < features.length; i++) {
                const feature = features[i];
                const node = this.getFeatureNode(feature);

                this.updateFeatureNode(node, feature, {
                    highlight,
                    normalizedKeyword,
                    isInjected,
                    getSettingValue,
                    index: i
                });

                desiredNodes.push(node);
            }

            const parent = this.els.list;
            const visibleNodeSet = new Set(desiredNodes);

            const currentChildren = Array.from(parent.children);
            currentChildren.forEach(child => {
                if (!visibleNodeSet.has(child)) {
                    parent.removeChild(child);
                }
            });

            let cursor = parent.firstChild;
            for (const node of desiredNodes) {
                if (node === cursor) {
                    cursor = cursor.nextSibling;
                    continue;
                }
                parent.insertBefore(node, cursor);
            }

            this.els.list.style.display = features.length ? 'flex' : 'none';
            this.els.empty.style.display = features.length ? 'none' : 'block';
            this.updateFab();
        }

        updateFab() {
            const canSave = this.app.state.isInjected && this.app.state.hasPending();

            if (!this.app.state.isInjected) {
                this.els.btnSave.classList.add('disabled');
            } else {
                this.els.btnSave.classList.remove('disabled');
            }

            if (canSave) {
                this.els.btnSave.classList.add('pulse');
            } else {
                this.els.btnSave.classList.remove('pulse');
            }
        }

        showLoader(show) {
            if (show) {
                this.els.loading.style.opacity = '1';
                this.els.container.classList.remove('ready');
            } else {
                this.els.loading.style.opacity = '0';
                setTimeout(() => {
                    this.els.loading.style.display = 'none';
                    this.els.container.classList.add('ready');
                }, 200);
            }
        }

        toast(msg) {
            if (!this.app.tcqt.showToast(msg)) {
                const el = document.createElement('div');
                el.className = 'toast';
                el.textContent = msg;
                this.els.toast.appendChild(el);
                setTimeout(() => el.remove(), 3000);
            }
        }
    }

    class TCQTApp {
        constructor() {
            this.tcqt = new TCQTService();
            this.state = new AppState();
            this.ui = new UIManager(this);

            this._renderScheduled = false;

            this.init();
        }

        init() {
            this.ui.showLoader(true);

            setTimeout(() => {
                this.state.isInjected = this.tcqt.isAvailable;

                const h = this.tcqt.getHostInfo();
                const m = this.tcqt.getModuleInfo();

                if (h && m) {
                    document.getElementById('hostVersion').textContent = `${h.name} ${h.version} ${h.channel}`;
                    document.getElementById('moduleVersion').textContent = `${m.name} ${m.version}`;
                } else {
                    document.getElementById('hostVersionBadge').classList.add('error');
                    document.getElementById('moduleVersionBadge').classList.add('error');
                    document.getElementById('hostVersion').textContent = '环境未注入';
                    document.getElementById('moduleVersion').textContent = '环境未注入';
                    this.ui.els.btnSearch.style.display = 'none';
                }

                this.state.setFeatures(this.tcqt.getFeaturesConfig());
                this.updateStats();
                this.bindEvents();
                this.renderNow();
                this.ui.showLoader(false);
            }, 150);
        }

        requestRender() {
            if (this._renderScheduled) return;
            this._renderScheduled = true;

            requestAnimationFrame(() => {
                this._renderScheduled = false;
                this.renderNow();
            });
        }

        renderNow() {
            this.ui.renderTabs(this.state.tabs, this.state.currentTab);
            this.ui.renderFeatures(this.state.getVisibleFeatures(), this.state.searchKey);
        }

        switchTab(tab) {
            if (this.state.currentTab === tab && !this.state.isSearch) return;
            if (this.state.isSearch) {
                this.state.isSearch = false;
                this.state.searchKey = '';
                this.ui.els.searchInput.value = '';
                this.ui.els.navWrapper.classList.remove('search-active');
                document.getElementById('search-clear-btn').classList.remove('visible');
            }
            this.state.currentTab = tab;
            this.requestRender();
        }

        updateStats() {
            document.getElementById('enabledCount').textContent = this.state.isInjected
                ? this.tcqt.getEnabledActionCount()
                : '-';
            document.getElementById('disabledCount').textContent = this.state.isInjected
                ? this.tcqt.getDisabledActionCount()
                : '-';
        }

        enterSearch() {
            if (this.state.isSearch) return;
            this.state.isSearch = true;
            this.ui.els.navWrapper.classList.add('search-active');
            setTimeout(() => this.ui.els.searchInput.focus(), 100);
        }

        exitSearch() {
            const hadSearch = this.state.isSearch || this.state.searchKey !== '';
            this.state.isSearch = false;
            this.state.searchKey = '';
            this.ui.els.searchInput.value = '';
            this.ui.els.navWrapper.classList.remove('search-active');
            document.getElementById('search-clear-btn').classList.remove('visible');

            if (hadSearch) {
                this.requestRender();
            }
        }

        save() {
            if (!this.state.isInjected) return this.ui.toast('环境异常，无法保存');
            if (!this.state.hasPending()) return this.ui.toast('没有修改需要保存');

            let err = false;

            for (const [key, changes] of this.state.pending.entries()) {
                if ('enabled' in changes) {
                    if (!this.tcqt.saveBooleanSetting(key, changes.enabled)) err = true;
                }

                if ('value' in changes) {
                    if (typeof changes.value === 'string') {
                        if (!this.tcqt.saveStringSetting(key, changes.value)) err = true;
                    } else {
                        if (!this.tcqt.saveIntSetting(key, changes.value)) err = true;
                    }
                }
            }

            if (err) return this.ui.toast('部分设置保存失败，请重试');

            this.state.clearPending();
            this.updateStats();
            this.ui.updateFab();

            if (confirm('已保存，是否重启宿主以应用更改？')) {
                if (!this.tcqt.exitApp()) this.ui.toast('自动重启失败，请手动重启');
            } else {
                this.ui.toast('设置已保存，重启后生效');
            }
        }

        bindEvents() {
            let searchTimer = null;

            if (this.ui.els.btnSearch) {
                this.ui.els.btnSearch.onclick = () => this.enterSearch();
            }

            if (this.ui.els.searchBackBtn) {
                this.ui.els.searchBackBtn.onclick = () => this.exitSearch();
            }

            const searchClearBtn = document.getElementById('search-clear-btn');
            if (searchClearBtn) {
                searchClearBtn.onclick = () => {
                    const hadValue = this.state.searchKey !== '';
                    this.ui.els.searchInput.value = '';
                    searchClearBtn.classList.remove('visible');
                    this.state.searchKey = '';
                    if (hadValue) this.requestRender();
                    this.ui.els.searchInput.focus();
                };
            }

            if (this.ui.els.searchInput) {
                this.ui.els.searchInput.oninput = (e) => {
                    const v = e.target.value || '';

                    if (searchClearBtn) {
                        searchClearBtn.classList.toggle('visible', v.length > 0);
                    }

                    clearTimeout(searchTimer);
                    searchTimer = setTimeout(() => {
                        if (this.state.searchKey === v) return;
                        this.state.searchKey = v;
                        this.requestRender();
                    }, 120);
                };
            }

            this.ui.els.tabs.addEventListener('click', (e) => {
                const btn = e.target.closest('.tab-btn');
                if (!btn) return;
                this.switchTab(btn.dataset.tab);
                requestAnimationFrame(() => {
                    const activeBtn = this.ui.els.tabs.querySelector('.tab-btn.active');
                    this.ui.scrollTabToCenter(activeBtn, 'smooth');
                });
            });

            this.ui.els.list.addEventListener('click', (e) => {
                const header = e.target.closest('.feature-header');
                if (!header) return;
                if (e.target.closest('.switch-wrapper')) return;

                const item = header.closest('.feature-item');
                if (!item || item.dataset.expandable !== '1') return;

                const expanded = !item.classList.contains('expanded');
                item.classList.toggle('expanded', expanded);
                item.dataset.manualExpanded = expanded ? '1' : '0';
            });

            this.ui.els.list.addEventListener('change', (e) => {
                const t = e.target;
                if (!(t instanceof HTMLInputElement)) return;

                const role = t.dataset.role;
                if (role === 'switch') {
                    this.state.savePending(t.dataset.settingKey, 'enabled', t.checked);
                    this.ui.updateFab();
                    return;
                }

                if (role === 'option') {
                    const settingKey = t.dataset.settingKey;
                    const isMulti = t.dataset.multi === '1';

                    if (isMulti) {
                        let value = 0;
                        const group = t.closest('.options-group');
                        if (group) {
                            const inputs = group.querySelectorAll('input[data-role="option"]');
                            inputs.forEach(input => {
                                if (input.checked) {
                                    const optValue = parseInt(input.dataset.optionValue, 10);
                                    if (!Number.isNaN(optValue)) {
                                        value |= (1 << (optValue - 1));
                                    }
                                }
                            });
                        }
                        this.state.savePending(settingKey, 'value', value);
                    } else if (t.checked) {
                        const optValue = parseInt(t.dataset.optionValue, 10);
                        this.state.savePending(settingKey, 'value', optValue);
                    }

                    this.ui.updateFab();
                }
            });

            this.ui.els.list.addEventListener('input', (e) => {
                const t = e.target;
                if (!(t instanceof HTMLTextAreaElement)) return;
                if (t.dataset.role !== 'textarea') return;

                this.state.savePending(t.dataset.settingKey, 'value', t.value);
                this.ui.updateFab();
            });

            const bindLongPress = (el, onTap, onLongPress, delay = 600) => {
                if (!el) return;

                let lpTimer = 0;
                let triggered = false;
                let pointerId = null;

                const clear = () => {
                    clearTimeout(lpTimer);
                    lpTimer = 0;
                    pointerId = null;
                };

                el.addEventListener('pointerdown', (e) => {
                    if (!e.isPrimary || e.button !== 0) return;
                    pointerId = e.pointerId;
                    triggered = false;
                    clearTimeout(lpTimer);
                    lpTimer = setTimeout(() => {
                        triggered = true;
                        onLongPress();
                    }, delay);
                }, { passive: true });

                el.addEventListener('pointerup', (e) => {
                    if (pointerId !== e.pointerId) return;
                    clear();
                    if (!triggered) onTap();
                    triggered = false;
                });

                const cancel = (e) => {
                    if (pointerId !== null && e.pointerId !== pointerId) return;
                    clear();
                    triggered = false;
                };

                el.addEventListener('pointercancel', cancel);
                el.addEventListener('pointerleave', cancel);
                el.addEventListener('contextmenu', e => e.preventDefault());
            };

            bindLongPress(
                this.ui.els.btnSave,
                () => this.save(),
                () => {
                    if (!this.state.isInjected) return this.ui.toast('环境异常');

                    if (confirm('是否清空所有配置？此操作不可逆！')) {
                        if (this.tcqt.clearConfig()) {
                            this.state.clearPending();

                            if (confirm('配置已清空，是否重启？')) {
                                if (!this.tcqt.exitApp()) this.ui.toast('重启失败');
                            } else {
                                this.updateStats();
                                this.requestRender();
                            }
                        } else {
                            this.ui.toast('清空失败');
                        }
                    }
                }
            );

            const issueLink = document.getElementById('issueLink');
            if (issueLink) {
                const url = 'https://github.com/callng/TCQT/issues';
                bindLongPress(
                    issueLink,
                    () => this.tcqt.openUrl(url, false),
                    () => this.tcqt.openUrl(url, true)
                );
                issueLink.addEventListener('click', e => e.preventDefault());
            }

            const root = document.documentElement;

            const setKbd = (px) => {
                const v = Math.max(0, px | 0);
                root.style.setProperty('--kbd', v + 'px');
                root.classList.toggle('keyboard-open', v > 0);
            };

            const KBD_THRESHOLD = 80;
            let layoutBaseline = Math.max(window.innerHeight, document.documentElement.clientHeight);

            const updateBaseline = () => {
                const vv = window.visualViewport;
                const layoutNow = Math.max(window.innerHeight, document.documentElement.clientHeight);

                if (!vv) {
                    layoutBaseline = layoutNow;
                    return;
                }

                const delta = Math.max(0, layoutNow - vv.height - (vv.offsetTop || 0));
                if (delta < KBD_THRESHOLD) {
                    layoutBaseline = Math.max(layoutBaseline, layoutNow);
                }
            };

            const calcKbd = () => {
                const vv = window.visualViewport;
                if (!vv) return 0;

                const layoutNow = Math.max(layoutBaseline, window.innerHeight, document.documentElement.clientHeight);
                const k = Math.max(
                    0,
                    layoutNow - vv.height - (vv.offsetTop || 0),
                    layoutNow - vv.height
                );

                return k >= KBD_THRESHOLD ? k : 0;
            };

            let raf = 0;
            const applyKbd = () => {
                cancelAnimationFrame(raf);
                raf = requestAnimationFrame(() => {
                    updateBaseline();
                    setKbd(calcKbd());
                });
            };

            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', applyKbd);
                window.visualViewport.addEventListener('scroll', applyKbd);
            }

            window.addEventListener('resize', applyKbd);
            window.addEventListener('orientationchange', applyKbd);
            applyKbd();

            let focusTimer = 0;
            const ensureVisible = (el) => {
                if (!el) return;
                clearTimeout(focusTimer);
                focusTimer = setTimeout(() => {
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            try {
                                el.scrollIntoView({ block: 'center', inline: 'nearest' });
                            } catch (e) {
                            }
                        });
                    });
                }, 80);
            };

            document.addEventListener('focusin', (e) => {
                const t = e.target;
                const ok = t && (
                    (t.tagName === 'INPUT' && t.type !== 'checkbox' && t.type !== 'radio') ||
                    t.tagName === 'TEXTAREA' ||
                    t.isContentEditable
                );
                if (ok) ensureVisible(t);
            }, true);

            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', () => ensureVisible(document.activeElement));
            }

            document.addEventListener('focusout', () => {
                setTimeout(applyKbd, 50);
            }, true);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        window.app = new TCQTApp();
    });
</script>
</body>

</html>
