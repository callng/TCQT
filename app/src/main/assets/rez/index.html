<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />
    <title>TCQT 设置</title>
    <script>
        (function () {
            try {
                if (typeof TCQT !== 'undefined' && TCQT.isDarkModeByHost && TCQT.isDarkModeByHost()) {
                    document.documentElement.classList.add('dark-mode');
                    document.querySelector('meta[name="theme-color"][media="(prefers-color-scheme: light)"]').setAttribute('content', '#111827');
                }
            } catch (e) {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.classList.add('dark-mode');
                }
            }
        })();
    </script>
    <style>
        html,
        body {
            overflow-anchor: none;
        }

        :root {
            --kbd: 0px;
            --md-sys-color-primary: #0a56d9;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #d3e3fd;
            --md-sys-color-on-primary-container: #041e49;

            --md-sys-color-background: #f8f9fa;
            --md-sys-color-on-background: #1f1f1f;
            --md-sys-color-surface: #ffffff;
            --md-sys-color-surface-variant: #e1e3e1;
            --md-sys-color-on-surface: #1f1f1f;
            --md-sys-color-on-surface-variant: #444746;
            --md-sys-color-outline: #747775;
            --md-sys-color-outline-variant: #c4c7c5;

            --md-sys-color-error: #ba1a1a;
            --md-sys-color-success: #146c2e;

            --md-sys-elevation-1: 0 1px 2px 0 rgba(0, 0, 0, 0.1), 0 1px 3px 1px rgba(0, 0, 0, 0.06);
            --md-sys-elevation-2: 0 1px 2px 0 rgba(0, 0, 0, 0.1), 0 2px 6px 2px rgba(0, 0, 0, 0.06);
            --md-sys-elevation-3: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 4px 8px 3px rgba(0, 0, 0, 0.06);

            --md-sys-shape-corner-medium: 12px;
            --md-sys-shape-corner-large: 16px;
            --md-sys-shape-corner-full: 9999px;

            --transition-standard: 200ms cubic-bezier(0.2, 0, 0, 1);
            --transition-emphasized: 300ms cubic-bezier(0.2, 0, 0, 1);
        }

        .dark-mode {
            --md-sys-color-primary: #a8c7fa;
            --md-sys-color-on-primary: #062e6f;
            --md-sys-color-primary-container: #0842a0;
            --md-sys-color-on-primary-container: #d3e3fd;

            --md-sys-color-background: #111114;
            --md-sys-color-on-background: #e2e2e2;
            --md-sys-color-surface: #1f1f22;
            --md-sys-color-surface-variant: #444746;
            --md-sys-color-on-surface: #e2e2e2;
            --md-sys-color-on-surface-variant: #c4c7c5;
            --md-sys-color-outline: #8e918f;
            --md-sys-color-outline-variant: #444746;

            --md-sys-color-error: #ffb4ab;
            --md-sys-color-success: #6dd58c;

            --md-sys-elevation-1: 0 1px 2px 0 rgba(0, 0, 0, 0.3), 0 1px 3px 1px rgba(0, 0, 0, 0.15);
            --md-sys-elevation-2: 0 1px 2px 0 rgba(0, 0, 0, 0.3), 0 2px 6px 2px rgba(0, 0, 0, 0.15);
            --md-sys-elevation-3: 0 1px 3px 0 rgba(0, 0, 0, 0.3), 0 4px 8px 3px rgba(0, 0, 0, 0.15);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            padding-bottom: var(--kbd);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            overflow-x: hidden;
            line-height: 1.5;
            transition: background-color var(--transition-standard), color var(--transition-standard);
        }

        /* Icons */
        .icon {
            fill: currentColor;
            display: inline-block;
            vertical-align: -.125em;
            width: 1em;
            height: 1em;
            pointer-events: none;
        }

        .icon-sm {
            width: 14px;
            height: 14px;
            pointer-events: none;
        }

        .icon-md {
            width: 18px;
            height: 18px;
            pointer-events: none;
        }

        .empty-icon {
            width: 48px;
            height: 48px;
            opacity: 0.6;
            display: block;
            margin: 0 auto 16px;
            pointer-events: none;
        }

        /* 高性能背景 */
        .app-background {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            opacity: 0.4;
            background: radial-gradient(circle at 15% 10%, rgba(10, 86, 217, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 85% 90%, rgba(20, 108, 46, 0.05) 0%, transparent 40%);
        }

        .dark-mode .app-background {
            opacity: 0.15;
            background: radial-gradient(circle at 15% 10%, rgba(168, 199, 250, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 90%, rgba(109, 213, 140, 0.1) 0%, transparent 40%);
        }

        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--md-sys-color-background);
            z-index: 9999;
            transition: opacity var(--transition-standard);
        }

        .md3-spinner {
            width: 48px;
            height: 48px;
            animation: rotate 2s linear infinite;
        }

        .md3-spinner circle {
            stroke: var(--md-sys-color-primary);
            stroke-dasharray: 1, 200;
            stroke-dashoffset: 0;
            animation: dash 1.5s ease-in-out infinite;
            stroke-linecap: round;
        }

        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes dash {
            0% {
                stroke-dasharray: 1, 200;
                stroke-dashoffset: 0;
            }

            50% {
                stroke-dasharray: 89, 200;
                stroke-dashoffset: -35px;
            }

            100% {
                stroke-dasharray: 89, 200;
                stroke-dashoffset: -124px;
            }
        }

        /* 布局 */
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity var(--transition-emphasized), transform var(--transition-emphasized);
        }

        .app-container.ready {
            opacity: 1;
            transform: translateY(0);
        }

        /* 头部 */
        .app-header {
            margin-bottom: 24px;
            text-align: center;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 12px;
            color: var(--md-sys-color-on-background);
            letter-spacing: -0.02em;
        }

        .version-badges {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: var(--md-sys-shape-corner-full);
            font-size: 0.8125rem;
            font-weight: 500;
        }

        .badge-host {
            background-color: var(--md-sys-color-surface-variant);
            color: var(--md-sys-color-on-surface-variant);
        }

        .badge-module {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
        }

        .badge.error {
            background-color: var(--md-sys-color-error);
            color: var(--md-sys-color-surface);
            opacity: 0.9;
        }

        .stats-card {
            display: flex;
            background: var(--md-sys-color-surface);
            border-radius: var(--md-sys-shape-corner-medium);
            padding: 12px 0;
            box-shadow: var(--md-sys-elevation-1);
            justify-content: space-evenly;
            align-items: center;
            border: 1px solid var(--md-sys-color-outline-variant);
        }

        .stat-item {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--md-sys-color-on-surface-variant);
            margin-top: 2px;
        }

        .text-success {
            color: var(--md-sys-color-success);
        }

        .text-muted {
            color: var(--md-sys-color-outline);
        }

        .stat-divider {
            width: 1px;
            height: 32px;
            background-color: var(--md-sys-color-surface-variant);
        }

        /* 导航 */
        .sticky-nav-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 8px 0;
            background-color: var(--md-sys-color-background);
            margin: -8px 0 16px;
        }

        .tab-navigation-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            background: var(--md-sys-color-surface);
            padding: 6px;
            border-radius: var(--md-sys-shape-corner-full);
            box-shadow: var(--md-sys-elevation-1);
            border: 1px solid var(--md-sys-color-outline-variant);
        }

        .tab-navigation {
            flex: 1;
            display: flex;
            overflow-x: auto;
            gap: 4px;
            padding-right: 4px;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            transition: opacity var(--transition-standard);
        }

        .tab-navigation::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            appearance: none;
            background: transparent;
            border: none;
            padding: 8px 16px;
            border-radius: var(--md-sys-shape-corner-full);
            color: var(--md-sys-color-on-surface-variant);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition-standard);
            flex-shrink: 0;
        }

        .tab-btn.active {
            background: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
        }

        .icon-btn {
            appearance: none;
            background: transparent;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: var(--md-sys-color-on-surface-variant);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            flex-shrink: 0;
            transition: var(--transition-standard);
        }

        .icon-btn:active {
            background: var(--md-sys-color-surface-variant);
        }

        /* 搜索栏 */
        .search-bar-container {
            position: absolute;
            inset: 0;
            background: var(--md-sys-color-surface);
            border-radius: var(--md-sys-shape-corner-full);
            display: flex;
            align-items: center;
            padding: 0 6px;
            opacity: 0;
            pointer-events: none;
            transform: scaleX(0.95);
            transform-origin: right;
            transition: all 250ms cubic-bezier(0.2, 0, 0, 1);
        }

        .search-active .search-bar-container {
            opacity: 1;
            pointer-events: auto;
            transform: scaleX(1);
        }

        .search-active .tab-navigation,
        .search-active .search-trigger {
            opacity: 0;
            pointer-events: none;
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 0.9375rem;
            color: var(--md-sys-color-on-surface);
            padding: 0 8px;
            outline: none;
            width: 100%;
        }

        .search-input::placeholder {
            color: var(--md-sys-color-outline);
        }

        .search-clear {
            opacity: 0;
            pointer-events: none;
        }

        .search-clear.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .highlight {
            color: var(--md-sys-color-primary);
            font-weight: 700;
            background: var(--md-sys-color-primary-container);
            border-radius: 2px;
            padding: 0 2px;
        }

        /* 列表容器 */
        .feature-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 卡片特效 (Material 3 Accordion) */
        .feature-item {
            background: var(--md-sys-color-surface);
            border-radius: var(--md-sys-shape-corner-medium);
            border: 1px solid var(--md-sys-color-outline-variant);
            box-shadow: var(--md-sys-elevation-1);
            overflow: hidden;
            transition: box-shadow var(--transition-standard), transform var(--transition-standard);
            animation: slideUp 0.4s cubic-bezier(0.2, 0, 0, 1) backwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feature-header {
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            gap: 12px;
            position: relative;
        }

        .feature-header:active {
            background-color: var(--md-sys-color-surface-variant);
        }

        .feature-title-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .feature-icon-toggle {
            color: var(--md-sys-color-outline);
            font-size: 1rem;
            transition: transform var(--transition-standard);
        }

        .expanded .feature-icon-toggle {
            transform: rotate(180deg);
            color: var(--md-sys-color-primary);
        }

        .feature-title {
            font-size: 1rem;
            font-weight: 500;
            color: var(--md-sys-color-on-surface);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 展开内容 */
        .feature-content-wrapper {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows var(--transition-emphasized);
        }

        .expanded .feature-content-wrapper {
            grid-template-rows: 1fr;
        }

        .feature-content {
            overflow: hidden;
            padding: 0 16px;
            opacity: 0;
            transition: opacity 150ms ease;
        }

        .expanded .feature-content {
            opacity: 1;
            padding: 0 16px 16px;
            transition: opacity 300ms 100ms ease, padding var(--transition-emphasized);
        }

        .feature-desc {
            font-size: 0.875rem;
            color: var(--md-sys-color-on-surface-variant);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        /* Switch 开关 */
        .switch-wrapper {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
            flex-shrink: 0;
        }

        .switch-wrapper input {
            opacity: 0;
            width: 0;
            height: 0;
            position: absolute;
        }

        .switch-track {
            position: absolute;
            inset: 0;
            background-color: var(--md-sys-color-surface-variant);
            border-radius: 999px;
            transition: var(--transition-standard);
            border: 2px solid var(--md-sys-color-outline);
            box-sizing: border-box;
        }

        .switch-track::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background-color: var(--md-sys-color-outline);
            border-radius: 50%;
            transition: transform var(--transition-standard), background-color var(--transition-standard), width var(--transition-standard);
        }

        .switch-wrapper input:checked+.switch-track {
            background-color: var(--md-sys-color-primary);
            border-color: var(--md-sys-color-primary);
        }

        .switch-wrapper input:checked+.switch-track::after {
            transform: translateX(22px);
            background-color: var(--md-sys-color-on-primary);
            width: 18px;
        }

        .switch-wrapper input:active+.switch-track::after {
            width: 24px;
        }

        .switch-wrapper input:checked:active+.switch-track::after {
            transform: translateX(16px);
        }

        .switch-wrapper input:disabled+.switch-track {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Radio & Checkbox Options */
        .options-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: var(--md-sys-color-background);
            border-radius: var(--md-sys-shape-corner-medium);
            cursor: pointer;
            transition: background var(--transition-standard);
            border: 1px solid transparent;
        }

        .option-label:active {
            background: var(--md-sys-color-surface-variant);
        }

        .option-label:has(input:checked) {
            background: var(--md-sys-color-primary-container);
            border-color: var(--md-sys-color-primary-container);
        }

        .option-label input {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: var(--md-sys-color-primary);
        }

        .option-text {
            font-size: 0.9375rem;
            color: var(--md-sys-color-on-surface);
        }

        /* Textarea */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        .custom-textarea {
            width: 100%;
            font-family: inherit;
            font-size: 0.9375rem;
            padding: 12px;
            border-radius: var(--md-sys-shape-corner-medium);
            border: 1px solid var(--md-sys-color-outline);
            background: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            resize: vertical;
            min-height: 100px;
            transition: border-color var(--transition-standard), box-shadow var(--transition-standard);
            outline: none;
        }

        .custom-textarea:focus {
            border-color: var(--md-sys-color-primary);
            box-shadow: 0 0 0 1px var(--md-sys-color-primary) inset;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 48px 16px;
            color: var(--md-sys-color-outline);
        }

        .empty-state p {
            font-size: 1.125rem;
            font-weight: 500;
            margin: 0 0 8px;
            color: var(--md-sys-color-on-surface);
        }

        .empty-subtitle {
            font-size: 0.875rem;
        }

        /* 底部 */
        .app-footer {
            margin-top: 32px;
            text-align: center;
            padding-bottom: 80px;
        }

        .footer-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            color: var(--md-sys-color-on-surface-variant);
            text-decoration: none;
            border-radius: var(--md-sys-shape-corner-medium);
            font-size: 0.875rem;
            font-weight: 500;
        }

        .footer-btn:active {
            background: var(--md-sys-color-surface-variant);
        }

        .footer-copyright {
            font-size: 0.75rem;
            color: var(--md-sys-color-outline);
            margin-top: 16px;
        }

        /* FAB */
        .fab {
            position: fixed;
            right: 24px;
            bottom: calc(24px + var(--kbd));
            width: 64px;
            height: 64px;
            border-radius: var(--md-sys-shape-corner-large);
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            border: none;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--md-sys-elevation-3);
            transition: all var(--transition-standard);
            z-index: 1000;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .fab:active:not(.disabled) {
            transform: translateY(2px);
            box-shadow: var(--md-sys-elevation-2);
        }

        .fab.disabled {
            background: var(--md-sys-color-surface-variant);
            color: var(--md-sys-color-outline);
            box-shadow: none;
            pointer-events: none;
        }

        .fab.pulse:not(.disabled) {
            animation: fabPulse 2s infinite;
        }

        .fab.keyboard-hidden {
            transform: scale(0.92) translateY(8px) !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }

        @keyframes fabPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(10, 86, 217, 0.4);
            }

            70% {
                box-shadow: 0 0 0 12px rgba(10, 86, 217, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(10, 86, 217, 0);
            }
        }

        .dark-mode .fab.pulse:not(.disabled) {
            animation: fabPulseDark 2s infinite;
        }

        @keyframes fabPulseDark {
            0% {
                box-shadow: 0 0 0 0 rgba(168, 199, 250, 0.4);
            }

            70% {
                box-shadow: 0 0 0 12px rgba(168, 199, 250, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(168, 199, 250, 0);
            }
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 100px;
            left: 0;
            right: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            z-index: 9999;
        }

        .toast {
            background: var(--md-sys-color-on-surface);
            color: var(--md-sys-color-surface);
            padding: 12px 24px;
            border-radius: var(--md-sys-shape-corner-medium);
            box-shadow: var(--md-sys-elevation-2);
            font-size: 0.875rem;
            font-weight: 500;
            animation: toastIn 0.3s cubic-bezier(0.2, 0, 0, 1) forwards, toastOut 0.3s 2.7s ease-in forwards;
            max-width: 90vw;
            text-align: center;
            word-break: break-word;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: scale(1);
            }

            to {
                opacity: 0;
                transform: scale(0.9);
            }
        }
    </style>
</head>

<body>
<div class="app-background"></div>

<div id="loading-overlay" class="loading-overlay">
    <div class="md3-spinner">
        <svg viewBox="25 25 50 50">
            <circle cx="50" cy="50" r="20" fill="none" stroke-width="4" stroke-miterlimit="10" />
        </svg>
    </div>
    <p>初始化中...</p>

<div id="toast-container" class="toast-container"></div>

<script>
    'use strict';

    class TCQTService {
        get isAvailable() { return typeof TCQT !== 'undefined'; }
        getHostInfo() {
            if (!this.isAvailable) return null;
            try { return { name: TCQT.getHostName() || 'QQ', version: TCQT.getHostVersion() || '未知', channel: TCQT.getHostChannel() || '' }; }
            catch (e) { return null; }
        }
        getModuleInfo() {
            if (!this.isAvailable) return null;
            try { return { name: TCQT.getModuleName() || 'TCQT', version: TCQT.getModuleVersion() || '未知' }; }
            catch (e) { return null; }
        }
        getFeaturesConfig() {
            if (!this.isAvailable) return [];
            try { const cfg = JSON.parse(TCQT.getFeaturesConfig()); return Array.isArray(cfg) ? cfg.sort((a, b) => (a.uiOrder || 1000) - (b.uiOrder || 1000)) : []; }
            catch (e) { return []; }
        }
        getSetting(key) {
            if (!this.isAvailable) return { value: false };
            try { return JSON.parse(TCQT.getSetting(key)); } catch (e) { return { value: false }; }
        }
        saveBooleanSetting(k, v) { if (this.isAvailable) try { TCQT.saveValueB(k, v); return true; } catch (e) { return false; } return false; }
        saveStringSetting(k, v) { if (this.isAvailable) try { TCQT.saveValueS(k, v); return true; } catch (e) { return false; } return false; }
        saveIntSetting(k, v) { if (this.isAvailable) try { TCQT.saveValueI(k, v); return true; } catch (e) { return false; } return false; }
        getEnabledActionCount() { return this.isAvailable ? TCQT.getEnabledActionCount() : 0; }
        getDisabledActionCount() { return this.isAvailable ? TCQT.getDisabledActionCount() : 0; }
        showToast(msg) { if (this.isAvailable) try { TCQT.toast(msg); return true; } catch (e) { return false; } return false; }
        clearConfig() { if (this.isAvailable) try { TCQT.clear(); return true; } catch (e) { return false; } return false; }
        exitApp() { if (this.isAvailable) try { TCQT.exitApp(); return true; } catch (e) { return false; } return false; }
        openUrl(url, skip = false) { if (this.isAvailable) try { TCQT.openUrlInDefaultBrowser(url, skip); return true; } catch (e) { return false; } return false; }
    }

    class AppState {
        constructor() {
            this.features = [];
            this.isInjected = false;
            this.currentTab = '';
            this.tabs = [];
            this.isSearch = false;
            this.searchKey = '';
            this.pending = new Map();
        }
        setFeatures(list) {
            this.features = list;
            const set = new Set(list.map(f => f.uiTab || '基础'));
            this.tabs = Array.from(set).sort((a, b) => {
                if (a === '基础') return -1; if (b === '基础') return 1;
                if (a === '调试') return 1; if (b === '调试') return -1;
                if (a === '高级') return 1; if (b === '高级') return -1;
                return a.localeCompare(b, 'zh-CN');
            });
            if (!this.currentTab && this.tabs.length) this.currentTab = this.tabs[0];
        }
        getVisibleFeatures() {
            if (this.isSearch && this.searchKey.trim()) {
                const k = this.searchKey.toLowerCase().trim();
                return this.features.map(f => {
                    const label = (f.label || '').toLowerCase(), desc = (f.desc || '').toLowerCase();
                    let prio = 0;
                    if (label === k || desc === k) prio = 3; else if (label.indexOf(k) > -1) prio = 2; else if (desc.indexOf(k) > -1) prio = 1;
                    return prio > 0 ? Object.assign(Object.assign({}, f), { searchPriority: prio }) : null;
                }).filter(Boolean).sort((a, b) => b.searchPriority - a.searchPriority || (a.uiOrder || 1000) - (b.uiOrder || 1000));
            }
            return this.features.filter(f => (f.uiTab || '基础') === this.currentTab).sort((a, b) => (a.uiOrder || 1000) - (b.uiOrder || 1000));
        }
        savePending(key, type, val) {
            if (!this.pending.has(key)) this.pending.set(key, {});
            this.pending.get(key)[type] = val;
        }
        getPending(key, type) { return this.pending.has(key) && type in this.pending.get(key) ? this.pending.get(key)[type] : null; }
        clearPending() { this.pending.clear(); }
        hasPending() { return this.pending.size > 0; }
    }

    class UIManager {
        constructor(app) {
            this.app = app;
            this.els = {
                loading: document.getElementById('loading-overlay'),
                container: document.getElementById('app-container'),
                list: document.getElementById('feature-list'),
                empty: document.getElementById('empty-state'),
                tabs: document.getElementById('tab-navigation'),
                toast: document.getElementById('toast-container'),
                btnSave: document.getElementById('btnSave'),
                searchBar: document.getElementById('search-bar'),
                searchInput: document.getElementById('search-input'),
                btnSearch: document.getElementById('btn-search'),
                searchBackBtn: document.getElementById('search-back-btn'),
                navWrapper: document.getElementById('tab-navigation-wrapper')
            };
        }
        renderTabs(tabs, activeTab) {
            this.els.tabs.innerHTML = '';
            if (tabs.length <= 1) { this.els.tabs.style.display = 'none'; return; }
            tabs.forEach(t => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${t === activeTab ? 'active' : ''}`;
                btn.textContent = t;
                btn.onclick = (e) => {
                    this.app.switchTab(t);
                    const scrollLeft = btn.offsetLeft - (this.els.tabs.clientWidth / 2) + (btn.clientWidth / 2);
                    this.els.tabs.scrollTo({ left: scrollLeft, behavior: 'smooth' });
                };
                this.els.tabs.appendChild(btn);
            });
        }

        highlight(text, k) {
            if (!k || !text) return text;
            const regex = new RegExp(`(${k.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        renderFeatures(features, keyword = '') {
            const frag = document.createDocumentFragment();
            features.forEach((f, i) => {
                const item = document.createElement('div');
                item.className = 'feature-item';
                item.style.animationDelay = `${i * 30}ms`;

                // Header
                const header = document.createElement('div');
                header.className = 'feature-header';
                const titleWrap = document.createElement('div');
                titleWrap.className = 'feature-title-wrap';

                const isExpandable = (f.desc) || (f.options && f.options.length) || (f.textareas && f.textareas.length);

                if (isExpandable) titleWrap.innerHTML += `<svg class="icon icon-sm feature-icon-toggle" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M1.646 4.646a.5.5 0 0 1 .708 0L8 10.293l5.646-5.647a.5.5 0 0 1 .708.708l-6 6a.5.5 0 0 1-.708 0l-6-6a.5.5 0 0 1 0-.708z"/></svg>`;
                const title = document.createElement('span');
                title.className = 'feature-title';
                title.innerHTML = this.highlight(f.label, keyword);
                titleWrap.appendChild(title);

                const switchWrap = document.createElement('label');
                switchWrap.className = 'switch-wrapper';
                switchWrap.innerHTML = `<input type="checkbox" id="switch-${f.key}" /><span class="switch-track"></span>`;

                header.append(titleWrap, switchWrap);

                if (isExpandable) {
                    header.onclick = (e) => {
                        if (e.target.tagName === 'INPUT' || e.target.closest('.switch-wrapper')) {
                            return;
                        }
                        item.classList.toggle('expanded');
                    };
                }
                item.appendChild(header);

                // Content
                const contentWrap = document.createElement('div');
                contentWrap.className = 'feature-content-wrapper';
                const content = document.createElement('div');
                content.className = 'feature-content';

                if (f.desc) {
                    const desc = document.createElement('div');
                    desc.className = 'feature-desc';
                    desc.innerHTML = this.highlight(f.desc, keyword);
                    content.appendChild(desc);
                }

                if (f.options && f.options.length) {
                    const grp = document.createElement('div');
                    grp.className = 'options-group';
                    const isMulti = f.options[0].isMulti || false;
                    f.options.forEach(opt => {
                        const lbl = document.createElement('label');
                        lbl.className = 'option-label';
                        lbl.innerHTML = `<input type="${isMulti ? 'checkbox' : 'radio'}" name="opt-${f.key}" id="opt-${f.key}-${opt.value}" value="${opt.value}" />
                             <span class="option-text">${opt.label}</span>`;
                        grp.appendChild(lbl);
                    });
                    content.appendChild(grp);
                }

                if (f.textareas && f.textareas.length) {
                    const grp = document.createElement('div');
                    grp.className = 'input-group';
                    f.textareas.forEach(ta => {
                        const txt = document.createElement('textarea');
                        txt.className = 'custom-textarea';
                        txt.id = `ta-${ta.key}`;
                        txt.placeholder = ta.placeholder || '';
                        grp.appendChild(txt);
                    });
                    content.appendChild(grp);
                }

                contentWrap.appendChild(content);
                item.appendChild(contentWrap);

                // Auto-expand search results
                if (keyword && isExpandable) {
                    const k = keyword.trim().toLowerCase();
                    const hay = ((f.label || '') + ' ' + (f.desc || '')).toLowerCase();
                    if (k && hay.indexOf(k) > -1) item.classList.add('expanded');
                }

                frag.appendChild(item);
            });

            this.els.list.innerHTML = '';
            this.els.list.appendChild(frag);
            this.els.list.style.display = features.length ? 'flex' : 'none';
            this.els.empty.style.display = features.length ? 'none' : 'block';
        }

        syncState(features) {
            features.forEach(f => {
                const cb = document.getElementById(`switch-${f.key}`);
                if (cb) {
                    const pend = this.app.state.getPending(f.key, 'enabled');
                    cb.checked = pend !== null ? pend : this.app.tcqt.getSetting(f.key).value;
                    cb.onchange = () => { this.app.state.savePending(f.key, 'enabled', cb.checked); this.updateFab(); };
                    if (!this.app.state.isInjected) cb.disabled = true;
                }
                if (f.options && f.options.length) {
                    const optKey = f.options[0].key;
                    const isMulti = f.options[0].isMulti || false;
                    const pend = this.app.state.getPending(optKey, 'value');
                    let val = pend !== null ? pend : (this.app.tcqt.getSetting(optKey).value !== undefined ? parseInt(this.app.tcqt.getSetting(optKey).value) : (isMulti ? 0 : f.options[0].value));

                    f.options.forEach(opt => {
                        const el = document.getElementById(`opt-${f.key}-${opt.value}`);
                        if (!el) return;
                        if (isMulti) el.checked = (val & (1 << (opt.value - 1))) !== 0;
                        else el.checked = val === opt.value;
                        if (!this.app.state.isInjected) el.disabled = true;

                        el.onchange = () => {
                            if (isMulti) {
                                let cv = 0;
                                f.options.forEach(o => {
                                    const cell = document.getElementById(`opt-${f.key}-${o.value}`);
                                    if (cell && cell.checked) {
                                        cv |= (1 << (o.value - 1));
                                    }
                                });
                                this.app.state.savePending(optKey, 'value', cv);
                            } else {
                                if (el.checked) this.app.state.savePending(optKey, 'value', opt.value);
                            }
                            this.updateFab();
                        };
                    });
                }
                if (f.textareas && f.textareas.length) {
                    f.textareas.forEach(ta => {
                        const el = document.getElementById(`ta-${ta.key}`);
                        if (!el) return;
                        const pend = this.app.state.getPending(ta.key, 'value');
                        el.value = pend !== null ? pend : (this.app.tcqt.getSetting(ta.key).value || '');
                        if (!this.app.state.isInjected) el.disabled = true;
                        el.oninput = () => { this.app.state.savePending(ta.key, 'value', el.value); this.updateFab(); };
                    });
                }
            });
            this.updateFab();
        }

        updateFab() {
            const canSave = this.app.state.isInjected && this.app.state.hasPending();
            if (!this.app.state.isInjected) {
                this.els.btnSave.classList.add('disabled');
            } else {
                this.els.btnSave.classList.remove('disabled');
            }

            if (canSave) {
                this.els.btnSave.classList.add('pulse');
            } else {
                this.els.btnSave.classList.remove('pulse');
            }
        }

        showLoader(show) {
            if (show) { this.els.loading.style.opacity = '1'; this.els.container.classList.remove('ready'); }
            else { this.els.loading.style.opacity = '0'; setTimeout(() => { this.els.loading.style.display = 'none'; this.els.container.classList.add('ready'); }, 200); }
        }

        toast(msg) {
            if (!this.app.tcqt.showToast(msg)) {
                const el = document.createElement('div');
                el.className = 'toast'; el.textContent = msg;
                this.els.toast.appendChild(el);
                setTimeout(() => el.remove(), 3000);
            }
        }
    }

    class TCQTApp {
        constructor() {
            this.tcqt = new TCQTService();
            this.state = new AppState();
            this.ui = new UIManager(this);
            this.init();
        }

        init() {
            this.ui.showLoader(true);
            setTimeout(() => {
                this.state.isInjected = this.tcqt.isAvailable;
                const h = this.tcqt.getHostInfo(), m = this.tcqt.getModuleInfo();
                if (h && m) {
                    document.getElementById('hostVersion').textContent = `${h.name} ${h.version} ${h.channel}`;
                    document.getElementById('moduleVersion').textContent = `${m.name} ${m.version}`;
                } else {
                    document.getElementById('hostVersionBadge').classList.add('error');
                    document.getElementById('moduleVersionBadge').classList.add('error');
                    document.getElementById('hostVersion').textContent = '环境未注入';
                    document.getElementById('moduleVersion').textContent = '环境未注入';
                    this.ui.els.btnSearch.style.display = 'none';
                }

                this.state.setFeatures(this.tcqt.getFeaturesConfig());
                this.updateStats();
                this.render();
                this.bindEvents();
                this.ui.showLoader(false);
            }, 150);
        }

        render() {
            this.ui.renderTabs(this.state.tabs, this.state.currentTab);
            const fb = this.state.getVisibleFeatures();
            this.ui.renderFeatures(fb, this.state.searchKey);
            this.ui.syncState(fb);
        }

        switchTab(t) {
            if (this.state.isSearch) this.exitSearch();
            this.state.currentTab = t;
            this.render();
        }

        updateStats() {
            document.getElementById('enabledCount').textContent = this.state.isInjected ? this.tcqt.getEnabledActionCount() : '-';
            document.getElementById('disabledCount').textContent = this.state.isInjected ? this.tcqt.getDisabledActionCount() : '-';
        }

        enterSearch() {
            this.state.isSearch = true;
            this.ui.els.navWrapper.classList.add('search-active');
            setTimeout(() => this.ui.els.searchInput.focus(), 100);
        }
        exitSearch() {
            this.state.isSearch = false;
            this.state.searchKey = '';
            this.ui.els.searchInput.value = '';
            this.ui.els.navWrapper.classList.remove('search-active');
            document.getElementById('search-clear-btn').classList.remove('visible');
            this.render();
        }

        save() {
            if (!this.state.isInjected) return this.ui.toast('环境异常，无法保存');
            if (!this.state.hasPending()) return this.ui.toast('没有修改需要保存');

            let err = false;
            // Only iterate over pending items to save
            const entries = this.state.pending.entries();
            for (let entry of entries) {
                const key = entry[0];
                const changes = entry[1];

                if ('enabled' in changes) {
                    if (!this.tcqt.saveBooleanSetting(key, changes.enabled)) err = true;
                }
                if ('value' in changes) {
                    if (typeof changes.value === 'string') {
                        if (!this.tcqt.saveStringSetting(key, changes.value)) err = true;
                    } else {
                        if (!this.tcqt.saveIntSetting(key, changes.value)) err = true;
                    }
                }
            }

            if (err) return this.ui.toast('部分设置保存失败，请重试');

            this.state.clearPending();
            this.updateStats();
            this.ui.updateFab();

            if (confirm('已保存，是否重启宿主以应用更改？')) {
                if (!this.tcqt.exitApp()) this.ui.toast('自动重启失败，请手动重启');
            } else {
                this.ui.toast('设置已保存，重启后生效');
            }
        }

        bindEvents() {
            // Search
            let timer = null;
            if (this.ui.els.btnSearch) this.ui.els.btnSearch.onclick = () => this.enterSearch();
            if (this.ui.els.searchBackBtn) this.ui.els.searchBackBtn.onclick = () => this.exitSearch();
            const searchClearBtn = document.getElementById('search-clear-btn');
            if (searchClearBtn) {
                searchClearBtn.onclick = () => {
                    this.ui.els.searchInput.value = '';
                    searchClearBtn.classList.remove('visible');
                    this.state.searchKey = '';
                    this.render();
                    if (this.ui.els.searchInput) this.ui.els.searchInput.focus();
                };
            }
            if (this.ui.els.searchInput) {
                this.ui.els.searchInput.oninput = (e) => {
                    const v = e.target.value;
                    if (searchClearBtn) {
                        if (v.length > 0) {
                            searchClearBtn.classList.add('visible');
                        } else {
                            searchClearBtn.classList.remove('visible');
                        }
                    }
                    clearTimeout(timer);
                    timer = setTimeout(() => { this.state.searchKey = v; this.render(); }, 150);
                };
            }

            // Save Btn Long Press
            let lpTimer = null, isLp = false;
            const btn = this.ui.els.btnSave;
            if (btn) {
                const down = (e) => {
                    if (e.type === 'mousedown' && e.button !== 0) return;
                    lpTimer = setTimeout(() => {
                        isLp = true;
                        if (!this.state.isInjected) return this.ui.toast('环境异常');
                        if (confirm('是否清空所有配置？此操作不可逆！')) {
                            if (this.tcqt.clearConfig()) {
                                this.state.clearPending();
                                if (confirm('配置已清空，是否重启？')) {
                                    if (!this.tcqt.exitApp()) this.ui.toast('重启失败');
                                } else {
                                    this.updateStats();
                                    this.render();
                                }
                            } else this.ui.toast('清空失败');
                        }
                    }, 600);
                };
                const up = (e) => { e.preventDefault(); clearTimeout(lpTimer); if (!isLp) this.save(); isLp = false; };
                const cancel = () => { clearTimeout(lpTimer); isLp = false; };

                btn.addEventListener('mousedown', down);
                btn.addEventListener('touchstart', down, { passive: false });
                btn.addEventListener('mouseup', up);
                btn.addEventListener('touchend', up, { passive: false });
                btn.addEventListener('mouseleave', cancel);
                btn.addEventListener('touchcancel', cancel);
                btn.addEventListener('contextmenu', e => e.preventDefault());
            }

            // Footer Link Handling
            const issueLink = document.getElementById('issueLink');
            if (issueLink) {
                let lpTimer = null, isLp = false;
                const url = 'https://github.com/callng/TCQT/issues';
                const down = (e) => {
                    if (e.type === 'mousedown' && e.button !== 0) return;
                    lpTimer = setTimeout(() => {
                        isLp = true;
                        this.tcqt.openUrl(url, true);
                    }, 600);
                };
                const up = (e) => {
                    e.preventDefault();
                    clearTimeout(lpTimer);
                    if (!isLp) this.tcqt.openUrl(url, false);
                    isLp = false;
                };
                const cancel = () => { clearTimeout(lpTimer); isLp = false; };

                issueLink.addEventListener('mousedown', down);
                issueLink.addEventListener('touchstart', down, { passive: false });
                issueLink.addEventListener('mouseup', up);
                issueLink.addEventListener('touchend', up, { passive: false });
                issueLink.addEventListener('mouseleave', cancel);
                issueLink.addEventListener('touchcancel', cancel);
                issueLink.addEventListener('click', e => e.preventDefault());
                issueLink.addEventListener('contextmenu', e => e.preventDefault());
            }
            // Keyboard safe-area handling for Android WebViews
            // Use visualViewport to compute keyboard height and add bottom padding.
            const root = document.documentElement;
            const setKbd = (px) => {
                const v = Math.max(0, px | 0);
                root.style.setProperty('--kbd', v + 'px');
                root.classList.toggle('keyboard-open', v > 0);
            };

            const calcKbd = () => {
                const vv = window.visualViewport;
                if (!vv) return 0;
                // innerHeight is layout viewport, vv.height shrinks when keyboard appears
                const k = Math.max(0, window.innerHeight - vv.height - (vv.offsetTop || 0));
                return k;
            };

            let raf = 0;
            const applyKbd = () => {
                cancelAnimationFrame(raf);
                raf = requestAnimationFrame(() => setKbd(calcKbd()));
            };

            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', applyKbd);
                window.visualViewport.addEventListener('scroll', applyKbd);
            }
            window.addEventListener('resize', applyKbd);
            applyKbd();

            // Focus scroll debounce: do one final adjustment after layout settles
            let focusTimer = 0;
            const ensureVisible = (el) => {
                if (!el) return;
                clearTimeout(focusTimer);
                focusTimer = setTimeout(() => {
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            try { el.scrollIntoView({ block: 'center', inline: 'nearest' }); } catch (e) { }
                        });
                    });
                }, 80);
            };

            document.addEventListener('focusin', (e) => {
                const t = e.target;
                const ok = t && (
                    (t.tagName === 'INPUT' && t.type !== 'checkbox' && t.type !== 'radio') ||
                    t.tagName === 'TEXTAREA' ||
                    t.isContentEditable
                );
                if (ok) ensureVisible(t);
            }, true);

            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', () => ensureVisible(document.activeElement));
            }
        }
    }

    document.addEventListener('DOMContentLoaded', () => window.app = new TCQTApp());

</script>
</body>
